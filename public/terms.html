<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TransferPro - Условия обслуживания</title>
    <meta name="description" content="Условия обслуживания TransferPro" />
    <style>
      :root {
        --bg: #0f1318;
        --surface: #151c24;
        --text: #f0f3f7;
        --muted: rgba(240, 243, 247, 0.72);
        --accent: #f5c86a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Manrope, system-ui, -apple-system, Segoe UI, sans-serif;
        background: radial-gradient(1100px 520px at 12% -8%, rgba(245, 200, 106, 0.14), transparent 60%),
          linear-gradient(180deg, #10161d 0%, #0c1117 52%, #0a0f14 100%);
        color: var(--text);
        min-height: 100vh;
      }
      .wrap {
        max-width: 860px;
        margin: 0 auto;
        padding: 32px 20px 56px;
      }
      .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .lang {
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        border-radius: 8px;
        padding: 6px 8px;
      }
      .card {
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 20px;
      }
      h1 {
        margin: 0 0 16px;
        color: var(--accent);
        font-size: 30px;
        line-height: 1.2;
      }
      h2 {
        margin: 18px 0 8px;
        font-size: 16px;
        color: var(--accent);
      }
      p, li {
        color: var(--muted);
        line-height: 1.7;
        font-size: 14px;
      }
      a { color: var(--accent); }
      .top-link {
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="toolbar">
        <a id="top-link" class="top-link" href="./">← На главную</a>
        <select id="lang-switch" class="lang" aria-label="Language switcher">
          <option value="ru">RU</option>
          <option value="kk">KK</option>
          <option value="en">EN</option>
        </select>
      </div>
      <section class="card">
        <h1 id="title"></h1>
        <p id="intro"></p>

        <h2 id="s1"></h2>
        <ul>
          <li id="s1li1"></li>
          <li id="s1li2"></li>
        </ul>

        <h2 id="s2"></h2>
        <ul>
          <li id="s2li1"></li>
          <li id="s2li2"></li>
        </ul>

        <h2 id="s3"></h2>
        <ul>
          <li id="s3li1"></li>
          <li id="s3li2"></li>
        </ul>

        <h2 id="s4"></h2>
        <ul>
          <li id="s4li1"></li>
          <li id="s4li2"></li>
        </ul>

        <h2 id="s5"></h2>
        <p id="s5p"></p>
      </section>
    </main>

    <script>
      const i18n = {
        ru: {
          pageTitle: 'TransferPro - Условия обслуживания',
          pageDescription: 'Условия обслуживания TransferPro',
          topLink: '← На главную',
          title: 'Условия обслуживания',
          intro: 'Настоящие условия регулируют порядок предоставления услуг трансфера TransferPro. Проект принадлежит ИП M.M.AUTO.',
          s1: '1. Оформление заявки',
          s1li1: 'Заявка оформляется через сайт или согласованный канал связи.',
          s1li2: 'Бронирование считается подтвержденным после обратной связи менеджера.',
          s2: '2. Стоимость и расчеты',
          s2li1: 'Стоимость согласуется до начала оказания услуги.',
          s2li2: 'Для корпоративных клиентов доступны договор и закрывающие документы.',
          s3: '3. Обязанности сторон',
          s3li1: 'Мы обеспечиваем своевременную подачу авто, соответствие класса и профессионализм водителя.',
          s3li2: 'Клиент предоставляет корректные контактные данные и информацию о маршруте.',
          s4: '4. Изменения и отмена',
          s4li1: 'Изменения маршрута и времени согласуются с менеджером.',
          s4li2: 'Условия отмены уточняются при подтверждении конкретной заявки.',
          s5: '5. Поддержка',
          s5p: 'Служба поддержки доступна 24/7. Актуальные контакты размещены на основном сайте TransferPro.',
        },
        kk: {
          pageTitle: 'TransferPro - Қызмет көрсету шарттары',
          pageDescription: 'TransferPro қызмет көрсету шарттары',
          topLink: '← Басты бетке',
          title: 'Қызмет көрсету шарттары',
          intro: 'Осы шарттар TransferPro трансфер қызметтерін ұсыну тәртібін реттейді. Жоба ЖК M.M.AUTO-ға тиесілі.',
          s1: '1. Өтінімді рәсімдеу',
          s1li1: 'Өтінім сайт немесе келісілген байланыс арнасы арқылы рәсімделеді.',
          s1li2: 'Бронь менеджердің кері байланысынан кейін расталған болып есептеледі.',
          s2: '2. Құны және есеп айырысу',
          s2li1: 'Қызмет көрсетілмес бұрын құны келісіліп бекітіледі.',
          s2li2: 'Корпоративтік клиенттерге келісімшарт және жабу құжаттары ұсынылады.',
          s3: '3. Тараптардың міндеттері',
          s3li1: 'Біз көлікті уақытында беруді, класс сәйкестігін және жүргізушінің кәсібилігін қамтамасыз етеміз.',
          s3li2: 'Клиент байланыс деректері мен маршрут туралы дұрыс ақпарат береді.',
          s4: '4. Өзгерту және бас тарту',
          s4li1: 'Маршрут пен уақыт өзгерістері менеджермен келісіледі.',
          s4li2: 'Бас тарту шарттары нақты өтінім расталғанда нақтыланады.',
          s5: '5. Қолдау',
          s5p: 'Қолдау қызметі 24/7 қолжетімді. Өзекті байланыс деректері TransferPro негізгі сайтында жарияланған.',
        },
        en: {
          pageTitle: 'TransferPro - Terms of Service',
          pageDescription: 'TransferPro terms of service',
          topLink: '← Back to home',
          title: 'Terms of Service',
          intro: 'These terms regulate how TransferPro transfer services are provided. The project belongs to IE M.M.AUTO.',
          s1: '1. Booking process',
          s1li1: 'Requests are submitted via the website or another agreed communication channel.',
          s1li2: 'A booking is considered confirmed after manager feedback.',
          s2: '2. Pricing and payments',
          s2li1: 'Pricing is agreed before the service starts.',
          s2li2: 'Contracts and closing documents are available for corporate clients.',
          s3: '3. Responsibilities of the parties',
          s3li1: 'We ensure timely pickup, matching vehicle class, and driver professionalism.',
          s3li2: 'The client provides correct contact details and route information.',
          s4: '4. Changes and cancellation',
          s4li1: 'Route and schedule changes are coordinated with the manager.',
          s4li2: 'Cancellation terms are clarified when a specific request is confirmed.',
          s5: '5. Support',
          s5p: 'Support is available 24/7. Up-to-date contacts are published on the main TransferPro website.',
        },
      }

      const allowed = ['ru', 'kk', 'en']
      const params = new URLSearchParams(window.location.search)
      const fromQuery = params.get('lang')
      const fromStorage = localStorage.getItem('language')
      const fromNavigator = navigator.language ? navigator.language.slice(0, 2).toLowerCase() : 'ru'
      const initialLanguage = allowed.includes(fromQuery) ? fromQuery : (allowed.includes(fromStorage) ? fromStorage : (allowed.includes(fromNavigator) ? fromNavigator : 'ru'))

      const applyLanguage = (language) => {
        const lang = allowed.includes(language) ? language : 'ru'
        const t = i18n[lang]

        document.documentElement.lang = lang
        document.title = t.pageTitle
        document.querySelector('meta[name="description"]').setAttribute('content', t.pageDescription)
        document.getElementById('lang-switch').value = lang
        document.getElementById('top-link').textContent = t.topLink
        document.getElementById('top-link').href = `./?lang=${lang}`

        Object.keys(t).forEach((key) => {
          if (['pageTitle', 'pageDescription', 'topLink'].includes(key)) return
          const node = document.getElementById(key)
          if (node) node.textContent = t[key]
        })

        localStorage.setItem('language', lang)
        params.set('lang', lang)
        history.replaceState(null, '', `${window.location.pathname}?${params.toString()}`)
      }

      document.getElementById('lang-switch').addEventListener('change', (event) => {
        applyLanguage(event.target.value)
      })

      applyLanguage(initialLanguage)
    </script>
  </body>
</html>
